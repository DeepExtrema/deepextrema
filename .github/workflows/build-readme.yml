name: ✦ Build README

on:
  push:
    branches: [main]
    paths:
      - 'profile.config.json'
      - 'scripts/**'
      - 'src/**'
      - 'assets/fonts/**'
      - '.github/workflows/build-readme.yml'
  schedule:
    - cron: '0 5 * * *'   # daily heatmap refresh
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-readme
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate assets
        run: node scripts/generate.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit changes
        run: |
          git config user.name "voyager-bot"
          git config user.email "voyager-bot@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: refresh README assets ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push || echo "nothing to push"
