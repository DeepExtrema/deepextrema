name: 🜨 Update Voyager Cockpit

on:
  schedule:
    - cron: '0 */6 * * *'   # 6h cadence for fast-moving sections
    - cron: '0 5 * * *'     # additional daily run for slow sections (timeline, clock, heatmap)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'src/**'
      - '.github/workflows/update-cockpit.yml'

permissions:
  contents: write

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  update-cockpit:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      # ── Fast sections (every 6h) ───────────────────────
      - name: ✺ Flight telemetry        # update telemetry markdown
        run: python scripts/flight_telemetry.py
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }

      - name: ▸ Current transmissions   # § 02 SVG
        run: python scripts/current_focus.py
        continue-on-error: true
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }

      - name: 📡 Signal feed             # § 07 markdown
        run: python scripts/signal_feed.py
        continue-on-error: true
        env:
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          NASA_API_KEY:     ${{ secrets.NASA_API_KEY }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}

      # ── Slow sections (only on the daily cron) ────────
      - name: 🜨 Voyager header (weekly subtitle rotation)
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        run: python scripts/voyager_header.py

      - name: ◇ Project timeline        # § 03 SVG
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        run: python scripts/project_timeline.py
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }

      - name: 🕐 Commit clock            # § 04 SVG
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        run: python scripts/commit_clock.py
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }

      - name: ▦ Heatmap                  # § 05 SVG
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        run: python scripts/heatmap.py
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }

      - name: 🐍 Contribution snake     # bonus visual under heatmap
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        uses: Platane/snk@v3
        with:
          github_user_name: DeepExtrema
          outputs: |
            dist/github-snake.svg?palette=github-dark
            dist/github-snake-dark.svg?palette=github-dark

      # ── Always last ────────────────────────────────────
      - name: ⌑ Footer stamp
        run: python scripts/stamp_footer.py

      # ── Commit ────────────────────────────────────────
      - name: 💾 Commit changes
        run: |
          git config --local user.name "voyager-bot 🜨"
          git config --local user.email "voyager-bot@users.noreply.github.com"
          git add README.md readme-assets/ dist/ data/cache/ || true
          git diff --staged --quiet || git commit -m "🜨 cycle · $(date +'%Y-%m-%d %H:%M UTC')"
          git push || echo "nothing to push"
