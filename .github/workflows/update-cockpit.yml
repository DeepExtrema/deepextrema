name: 🜨 Update Voyager Cockpit

on:
  schedule:
    - cron: '0 */6 * * *'   # 6h cadence for fast-moving sections
    - cron: '0 5 * * *'     # additional daily run for slow sections (timeline, clock, heatmap)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'src/**'
      - '.github/workflows/update-cockpit.yml'

permissions:
  contents: write

jobs:
  update-cockpit:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🜨 Generate Voyager Cockpit
        run: node scripts/generateAll.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: 🐍 Contribution snake     # bonus visual under heatmap
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        uses: Platane/snk@v3
        with:
          github_user_name: DeepExtrema
          outputs: |
            dist/github-snake.svg?palette=github-dark
            dist/github-snake-dark.svg?palette=github-dark

      # ── Commit ────────────────────────────────────────
      - name: 💾 Commit changes
        run: |
          git config --local user.name "voyager-bot 🜨"
          git config --local user.email "voyager-bot@users.noreply.github.com"
          git add README.md readme-assets/ dist/ data/cache/ || true
          git diff --staged --quiet || git commit -m "🜨 cycle · $(date +'%Y-%m-%d %H:%M UTC')"
          git push || echo "nothing to push"
