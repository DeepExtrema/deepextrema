<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
  <!-- Glow filters -->
  <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-medium" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-hot" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Noise texture -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>

  <!-- Scanline pattern -->
  <pattern id="scanlines" width="1" height="2" patternUnits="userSpaceOnUse">
    <rect width="1" height="1" fill="white" opacity="0.01"/>
  </pattern>

  <!-- Dot grid pattern -->
  <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.5" fill="#dde4ec"/>
  </pattern>

  <!-- Vignette radial gradient -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#eef2f8" stop-opacity="0.6"/>
  </radialGradient>
</defs>
  <style>
  @keyframes radar-sweep {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }
  @keyframes blink {
    0%, 49%  { opacity: 1; }
    50%, 100%{ opacity: 0; }
  }
  @keyframes glow-breathe {
    0%, 100% { filter: url(#glow-medium); }
    50%      { filter: url(#glow-hot); }
  }
  .radar-sweep  { animation: radar-sweep 4s linear infinite; }
  .pulse-live   { animation: pulse 2s ease infinite; }
  .blink-cursor { animation: blink 1s step-end infinite; }
  .glow-breathe { animation: glow-breathe 8s ease infinite; }
</style>
  <!-- Deep space background -->
  <rect width="900" height="220" fill="#eef2f8"/>
  <!-- Dot grid -->
  <rect width="900" height="220" fill="url(#dotgrid)"/>
  <!-- Scanlines -->
  <rect width="900" height="220" fill="url(#scanlines)"/>
  <g class="star-field"><circle cx="148.5" cy="151.7" r="0.9" fill="white" opacity="0.32"/><circle cx="194.4" cy="174.4" r="1.0" fill="white" opacity="0.33"/><circle cx="454.6" cy="51.9" r="0.3" fill="white" opacity="0.28"/><circle cx="526.8" cy="15.2" r="1.0" fill="white" opacity="0.23"/><circle cx="209.4" cy="9.3" r="1.2" fill="white" opacity="0.41"/><circle cx="787.5" cy="135.5" r="0.3" fill="white" opacity="0.27"/><circle cx="447.8" cy="25.5" r="1.2" fill="white" opacity="0.28"/><circle cx="139.3" cy="179.9" r="0.4" fill="white" opacity="0.47"/><circle cx="407.8" cy="121.4" r="0.6" fill="white" opacity="0.32"/><circle cx="168.2" cy="8.2" r="1.1" fill="white" opacity="0.23"/><circle cx="702.2" cy="45.9" r="1.2" fill="white" opacity="0.46"/><circle cx="679.3" cy="167.8" r="0.8" fill="white" opacity="0.41"/><circle cx="110.2" cy="104.8" r="1.0" fill="white" opacity="0.22"/><circle cx="830.9" cy="195.3" r="0.7" fill="white" opacity="0.28"/><circle cx="406.2" cy="84.9" r="1.2" fill="white" opacity="0.29"/><circle cx="24.2" cy="20.5" r="0.9" fill="white" opacity="0.50"/><circle cx="446.4" cy="108.1" r="0.8" fill="white" opacity="0.41"/><circle cx="199.8" cy="134.0" r="0.8" fill="white" opacity="0.37"/><circle cx="162.6" cy="37.4" r="0.6" fill="white" opacity="0.47"/><circle cx="312.0" cy="131.4" r="0.6" fill="white" opacity="0.19"/><circle cx="59.1" cy="179.0" r="1.0" fill="white" opacity="0.28"/><circle cx="615.0" cy="148.7" r="1.1" fill="white" opacity="0.49"/><circle cx="366.3" cy="217.6" r="1.2" fill="white" opacity="0.36"/><circle cx="794.9" cy="108.0" r="0.6" fill="white" opacity="0.24"/><circle cx="788.5" cy="35.7" r="0.4" fill="white" opacity="0.43"/><circle cx="696.5" cy="106.3" r="1.1" fill="white" opacity="0.17"/><circle cx="232.2" cy="63.8" r="0.7" fill="white" opacity="0.21"/><circle cx="62.5" cy="74.4" r="1.1" fill="white" opacity="0.49"/><circle cx="671.3" cy="105.4" r="0.5" fill="white" opacity="0.49"/><circle cx="473.1" cy="160.3" r="0.3" fill="white" opacity="0.22"/><circle cx="754.4" cy="174.9" r="1.1" fill="white" opacity="0.36"/><circle cx="383.5" cy="127.9" r="1.1" fill="white" opacity="0.26"/><circle cx="480.9" cy="60.7" r="1.0" fill="white" opacity="0.15"/><circle cx="616.8" cy="209.9" r="0.3" fill="white" opacity="0.36"/><circle cx="579.5" cy="187.4" r="0.8" fill="white" opacity="0.24"/><circle cx="365.0" cy="210.9" r="1.1" fill="white" opacity="0.20"/><circle cx="85.4" cy="20.7" r="0.3" fill="white" opacity="0.31"/><circle cx="126.7" cy="190.8" r="0.9" fill="white" opacity="0.19"/><circle cx="484.8" cy="71.3" r="0.7" fill="white" opacity="0.23"/><circle cx="149.5" cy="40.5" r="0.6" fill="white" opacity="0.40"/></g>

  <g class="panel">
    <!-- Outer viewport -->
    <rect x="16" y="8" width="868" height="186"
          fill="none" stroke="#d0d8e4" stroke-width="1"
          stroke-dasharray="3,6" opacity="0.4"/>

    <!-- Inner panel background -->
    <rect x="24" y="16" width="852" height="170"
          fill="#ffffff" stroke="#d0d8e4" stroke-width="1"/>

    <!-- Title bar -->
    <line x1="24" y1="44" x2="876" y2="44"
          stroke="#d0d8e4" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="36" y="34" font-family="'Courier New', 'Consolas', monospace"
          font-size="10" fill="#cc7700"
          filter="url(#glow-soft)" letter-spacing="0.15em"
          text-anchor="start">[ MISSION LOG ]</text>
    <circle cx="816" cy="30" r="3"
            fill="#cc1133" class="pulse-live"/>
    <text x="824" y="34" font-family="'Courier New', 'Consolas', monospace"
          font-size="7" fill="#cc1133"
          class="pulse-live">LIVE</text>
    <text x="864" y="34" font-family="'Courier New', 'Consolas', monospace"
          font-size="7" fill="#8899aa"
          text-anchor="end">19:44Z</text>

    <!-- Status bar -->
    <line x1="24" y1="162" x2="876" y2="162"
          stroke="#d0d8e4" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="36" y="178" font-family="'Courier New', 'Consolas', monospace"
          font-size="7" fill="#8899aa"
          letter-spacing="0.05em">0 ACTIVE MISSIONS  │  0 TOTAL  │  ALL SYSTEMS NOMINAL</text>
  </g>
  <!-- Vignette overlay -->
  <rect width="100%" height="100%" fill="url(#vignette)"/>
</svg>