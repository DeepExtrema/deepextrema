<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
  <!-- Glow filters -->
  <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-medium" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-hot" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Noise texture -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>

  <!-- Scanline pattern -->
  <pattern id="scanlines" width="1" height="2" patternUnits="userSpaceOnUse">
    <rect width="1" height="1" fill="white" opacity="0.01"/>
  </pattern>

  <!-- Dot grid pattern -->
  <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.5" fill="#0d1a2a"/>
  </pattern>

  <!-- Vignette radial gradient -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#050a12" stop-opacity="0.6"/>
  </radialGradient>
</defs>
  <style>
  @keyframes radar-sweep {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }
  @keyframes blink {
    0%, 49%  { opacity: 1; }
    50%, 100%{ opacity: 0; }
  }
  @keyframes glow-breathe {
    0%, 100% { filter: url(#glow-medium); }
    50%      { filter: url(#glow-hot); }
  }
  .radar-sweep  { animation: radar-sweep 4s linear infinite; }
  .pulse-live   { animation: pulse 2s ease infinite; }
  .blink-cursor { animation: blink 1s step-end infinite; }
  .glow-breathe { animation: glow-breathe 8s ease infinite; }
</style>
  <!-- Deep space background -->
  <rect width="900" height="360" fill="#050a12"/>
  <!-- Dot grid -->
  <rect width="900" height="360" fill="url(#dotgrid)"/>
  <!-- Scanlines -->
  <rect width="900" height="360" fill="url(#scanlines)"/>
  <g class="star-field"><circle cx="81.3" cy="342.2" r="0.4" fill="white" opacity="0.41"/><circle cx="757.1" cy="269.0" r="0.6" fill="white" opacity="0.27"/><circle cx="649.7" cy="347.6" r="0.9" fill="white" opacity="0.34"/><circle cx="349.1" cy="146.1" r="0.9" fill="white" opacity="0.30"/><circle cx="480.8" cy="227.1" r="0.9" fill="white" opacity="0.16"/><circle cx="207.6" cy="254.1" r="0.8" fill="white" opacity="0.44"/><circle cx="47.2" cy="83.4" r="0.8" fill="white" opacity="0.41"/><circle cx="175.6" cy="275.3" r="0.7" fill="white" opacity="0.26"/><circle cx="746.5" cy="38.6" r="1.1" fill="white" opacity="0.26"/><circle cx="326.1" cy="73.1" r="0.7" fill="white" opacity="0.44"/><circle cx="199.0" cy="199.4" r="0.7" fill="white" opacity="0.26"/><circle cx="117.2" cy="251.2" r="0.7" fill="white" opacity="0.31"/><circle cx="542.4" cy="38.5" r="1.0" fill="white" opacity="0.46"/><circle cx="228.9" cy="293.8" r="0.9" fill="white" opacity="0.25"/><circle cx="242.9" cy="30.2" r="0.7" fill="white" opacity="0.31"/><circle cx="438.2" cy="173.4" r="0.8" fill="white" opacity="0.19"/><circle cx="202.1" cy="201.3" r="0.7" fill="white" opacity="0.21"/><circle cx="249.1" cy="352.5" r="1.0" fill="white" opacity="0.40"/><circle cx="319.8" cy="150.7" r="0.9" fill="white" opacity="0.35"/><circle cx="576.4" cy="12.8" r="0.9" fill="white" opacity="0.22"/><circle cx="294.7" cy="191.1" r="1.2" fill="white" opacity="0.29"/><circle cx="581.5" cy="75.1" r="1.1" fill="white" opacity="0.24"/><circle cx="486.8" cy="245.1" r="0.9" fill="white" opacity="0.31"/><circle cx="582.4" cy="3.7" r="1.2" fill="white" opacity="0.35"/><circle cx="535.6" cy="91.6" r="0.7" fill="white" opacity="0.37"/><circle cx="371.2" cy="43.7" r="0.5" fill="white" opacity="0.46"/><circle cx="185.1" cy="185.1" r="0.9" fill="white" opacity="0.23"/><circle cx="727.0" cy="171.3" r="1.2" fill="white" opacity="0.22"/><circle cx="382.8" cy="130.5" r="0.5" fill="white" opacity="0.30"/><circle cx="384.4" cy="142.0" r="1.1" fill="white" opacity="0.26"/></g>

