<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <pattern id="tstars" width="240" height="240" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="40" r="0.7" fill="#d4a85a" opacity="0.45"></circle>
      <circle cx="120" cy="180" r="0.5" fill="#f5e6b8" opacity="0.4"></circle>
      <circle cx="200" cy="80" r="0.6" fill="#d4a85a" opacity="0.35"></circle>
      <circle cx="80" cy="220" r="0.5" fill="#a89465" opacity="0.4"></circle>
    </pattern>
  </defs>
  <rect width="1200" height="420" fill="#000000"></rect>
  <rect width="1200" height="420" fill="url(#tstars)"></rect>

  <!-- Title -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" fill="#d4a85a" font-size="12" letter-spacing="3">
    <text x="60" y="44">§ 03  ·  PROJECT  TIMELINE  ·  2021–PRESENT</text>
    <text x="1140" y="44" text-anchor="end" fill="#6b5a3a">8 REPOS  ·  4 LIVE</text>
  </g>

  <!-- Year Ticks -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" fill="#a89465" font-size="11" letter-spacing="2">
    <text x="190.0" y="86">2021</text>
    <text x="348.3" y="86">2022</text>
    <text x="506.5" y="86">2023</text>
    <text x="664.8" y="86">2024</text>
    <text x="823.5" y="86">2025</text>
    <text x="981.7" y="86">2026</text>
  </g>
  <g stroke="#0a0805" stroke-width="1">
    <line x1="190.0" y1="92" x2="190.0" y2="380"></line>
    <line x1="348.3" y1="92" x2="348.3" y2="380"></line>
    <line x1="506.5" y1="92" x2="506.5" y2="380"></line>
    <line x1="664.8" y1="92" x2="664.8" y2="380"></line>
    <line x1="823.5" y1="92" x2="823.5" y2="380"></line>
    <line x1="981.7" y1="92" x2="981.7" y2="380"></line>
  </g>
  <line x1="190" y1="92" x2="1140" y2="92" stroke="#6b5a3a" stroke-width="0.8" opacity="0.5"></line>

  <!-- NOW Marker -->
  <line x1="1043.2" y1="92" x2="1043.2" y2="380" stroke="#f5e6b8" stroke-width="0.6" stroke-dasharray="3 3"></line>
  <text x="1043.2" y="105" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" fill="#f5e6b8" font-size="9" letter-spacing="3">NOW</text>

  <!-- Timeline Bars -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#f5e6b8">
    <!-- Row 0: cosmic-cockpit -->
    <text x="180" y="142" text-anchor="end">cosmic-cockpit</text>
    <rect x="868.6" y="130" width="174.3" height="16" fill="#d4a85a" stroke="#f5e6b8" stroke-width="0.8"></rect>
    <text x="875.6" y="142" fill="#0a0805" font-size="9" letter-spacing="1">PY · LIVE</text>
    <text x="1060" y="142" font-size="10" fill="#d4a85a">248★</text>
    <!-- Row 1: orbital-tooling -->
