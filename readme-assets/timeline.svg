    <text x="1060" y="232" font-size="10" fill="#d4a85a">612★</text>
    <!-- Row 4: pylon -->
    <text x="180" y="262" text-anchor="end">pylon</text>
    <rect x="611.9" y="250" width="349.5" height="16" fill="#2a1f0c" stroke="#7d5d2a" stroke-width="0.8"></rect>
    <text x="618.9" y="262" fill="#d4a85a" font-size="9" letter-spacing="1">GO · ARCHIVED</text>
    <text x="1060" y="262" font-size="10" fill="#a89465">71★</text>
    <!-- Row 5: meridian -->
