    <rect x="538.2" y="280" width="245.0" height="16" fill="#2a1f0c" stroke="#7d5d2a" stroke-width="0.8"></rect>
    <text x="545.2" y="292" fill="#d4a85a" font-size="9" letter-spacing="1">PY · ARCHIVED</text>
    <text x="1060" y="292" font-size="10" fill="#a89465">43★</text>
    <!-- Row 6: helios-dispatch -->
    <text x="180" y="322" text-anchor="end">helios-dispatch</text>
    <rect x="480.1" y="310" width="214.6" height="16" fill="#2a1f0c" stroke="#7d5d2a" stroke-width="0.8"></rect>
    <text x="487.1" y="322" fill="#d4a85a" font-size="9" letter-spacing="1">TS · ARCHIVED</text>
    <text x="1060" y="322" font-size="10" fill="#a89465">28★</text>
    <!-- Row 7: starboard-cli -->
    <text x="180" y="352" text-anchor="end">starboard-cli</text>
    <rect x="369.9" y="340" width="256.7" height="16" fill="#2a1f0c" stroke="#7d5d2a" stroke-width="0.8"></rect>
    <text x="376.9" y="352" fill="#d4a85a" font-size="9" letter-spacing="1">GO · ARCHIVED</text>
    <text x="1060" y="352" font-size="10" fill="#a89465">19★</text>
  </g>

  <!-- Legend -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#6b5a3a" letter-spacing="2">
    <rect x="60" y="390" width="14" height="6" fill="#d4a85a"></rect>
    <text x="82" y="397">LIVE</text>

    <rect x="160" y="390" width="14" height="6" fill="#2a1f0c" stroke="#7d5d2a"></rect>
    <text x="182" y="397">ARCHIVED</text>

    <text x="1140" y="397" text-anchor="end" fill="#6b5a3a">SRC · gh.user.get_repos()</text>
  </g>
